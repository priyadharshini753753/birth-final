<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <title>Happy Birthday Suman</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        text-align: center;
        background: linear-gradient(#87cefa, #bde6ff);
        color: #222;
        overflow: hidden;
      }

      /* stars */

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        animation: twinkle 2s infinite alternate;
      }

      @keyframes twinkle {
        from {
          opacity: 0.3;
        }
        to {
          opacity: 1;
        }
      }

      /* moon */

      .moon {
        position: absolute;
        top: 40px;
        right: 40px;
        width: 80px;
        height: 80px;
        background: #fffdd0;
        border-radius: 50%;
        box-shadow: 0 0 25px white;
      }

      /* pages */

      section {
        display: none;
        padding: 40px 20px;
      }

      .active {
        display: block;
      }

      /* envelope */

      .envelope {
        width: 200px;
        height: 120px;
        background: #ff6aa2;
        margin: 40px auto;
        position: relative;
        border-radius: 6px;
        cursor: pointer;
      }

      .flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-left: 100px solid transparent;
        border-right: 100px solid transparent;
        border-bottom: 60px solid #ff3d8b;
        transition: 0.6s;
      }

      .open .flap {
        transform: translateY(-60px);
      }

      /* letter */

      #letter {
        font-size: 20px;
        max-width: 500px;
        margin: auto;
      }
      #letterArea {
        position: relative;
        overflow: hidden;
      }

      .heart {
        position: absolute;
        color: red;
        font-size: 22px;
        animation: heartFly 4s linear forwards;
      }

      @keyframes heartFly {
        0% {
          transform: translateY(0) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translateY(-300px) scale(1.3);
          opacity: 0;
        }
      }

      /* balloons */

      .balloon {
        position: absolute;
        width: 50px;
        height: 65px;
        border-radius: 50%;
        animation: float 8s linear infinite;
      }

      .balloon:after {
        content: "";
        width: 2px;
        height: 40px;
        background: white;
        position: absolute;
        left: 50%;
        top: 65px;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh);
        }
        100% {
          transform: translateY(-200px);
        }
      }

      /* hearts */

      .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: heartFloat 5s linear infinite;
      }

      @keyframes heartFloat {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-400px);
        }
      }

      /* fireworks */

      .fire {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #ffd700;
        border-radius: 50%;
        animation: boom 1s ease-out forwards;
      }

      @keyframes boom {
        to {
          transform: translate(var(--x), var(--y)) scale(3);
          opacity: 0;
        }
      }

      /* gift */

      .giftBox {
        width: 140px;
        height: 120px;
        margin: 40px auto;
        position: relative;
        cursor: pointer;
      }

      .giftBase {
        width: 140px;
        height: 100px;
        background: #ff4d88;
        position: absolute;
        bottom: 0;
        border-radius: 10px;
      }

      .giftLid {
        width: 140px;
        height: 40px;
        background: #ff7ab8;
        position: absolute;
        top: 0;
        border-radius: 10px;
        transition: 1s;
      }

      .openGift .giftLid {
        transform: translateY(-80px) rotate(-20deg);
      }

      button {
        padding: 12px 22px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: #ff4d88;
        color: white;
        cursor: pointer;
        margin-top: 20px;
      }

      #lyrics {
        font-size: 20px;
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <div class="moon"></div>

    <!-- PAGE 1 -->

    <section id="page1" class="active">
      <h1>🎉 Happy Birthday 🎂</h1>
      <h2>Dear Best Friend</h2>

      <div class="envelope" onclick="openEnvelope(this)">
        <div class="flap"></div>
      </div>

      <p>Tap the envelope 💌</p>
    </section>

    <!-- PAGE 2 -->

    <section id="page2">
      <h1>💌 Birthday Letter</h1>

      <div id="letterArea">
        <div id="letter"></div>
      </div>

      <button onclick="goPage('page3')">🎁 Open Gift(ulla onu ila)</button>
    </section>

    <!-- PAGE 3 -->

    <section id="page3">
      <h1>🎁 Birthday Surprise 🎁</h1>

      <div class="giftBox" onclick="openGift()">
        <div class="giftLid"></div>
        <div class="giftBase"></div>
      </div>

      <p>Tap the gift 🎁</p>

      <div id="lyrics"></div>
    </section>

    <audio id="song" autoplay loop>
      <source
        src="https://pixabay.com/music/search/birthday/"
        type="audio/mpeg"
      />
    </audio>

    <script>
      /* stars */

      for (let i = 0; i < 80; i++) {
        let s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        document.body.appendChild(s);
      }

      /* balloons */

      for (let i = 0; i < 10; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "%";
        b.style.background = "hsl(" + Math.random() * 360 + ",70%,60%)";
        document.body.appendChild(b);
      }

      /* page change */

      function goPage(p) {
        document
          .querySelectorAll("section")
          .forEach((s) => s.classList.remove("active"));

        document.getElementById(p).classList.add("active");
      }

      /* envelope */

      function openEnvelope(el) {
        el.classList.add("open");

        setTimeout(() => {
          goPage("page2");

          typeLetter();

          startLetterHearts();
        }, 600);
      }

      /* typing letter */

      let text =
        "Hyy Hii!.. Nalla irukiya.anyways happy porenthanall pa!🎁 and  Thank you for every laugh and memory. I wish you happiness and success life ahead. aprmmm nalla naal ..nalla iru 💕✨ 🎉";

      let i = 0;

      function typeLetter() {
        let area = document.getElementById("letter");

        let timer = setInterval(() => {
          if (i < text.length) {
            area.innerHTML += text.charAt(i);

            i++;
          } else {
            clearInterval(timer);
          }
        }, 40);
      }

      /* hearts */

      function hearts() {
        setInterval(() => {
          let h = document.createElement("div");

          h.className = "heart";

          h.innerHTML = "❤️";

          h.style.left = Math.random() * 100 + "%";

          h.style.bottom = "0px";

          document.body.appendChild(h);

          setTimeout(() => h.remove(), 5000);
        }, 300);
      }

      /* fireworks */

      function fireworks() {
        setInterval(() => {
          for (let i = 0; i < 20; i++) {
            let f = document.createElement("div");

            f.className = "fire";

            f.style.left = "50%";

            f.style.top = "50%";

            f.style.setProperty("--x", Math.random() * 400 - 200 + "px");

            f.style.setProperty("--y", Math.random() * 400 - 200 + "px");

            document.body.appendChild(f);

            setTimeout(() => f.remove(), 1000);
          }
        }, 1500);
      }

      /* gift */

      function openGift() {
        let gift = document.querySelector(".giftBox");

        gift.classList.add("openGift");

        document.getElementById("song").play();

        fireworks();

        hearts();

        showLyrics();
      }

      /* lyrics */

      function showLyrics() {
        let text =
          "🎵 Happy Birthday to you 🎵<br>🎵 Happy Birthday to you 🎵<br>🎵 Happy Birthday Dear Suman 🎵<br>🎵 Happy Birthday to you 🎵";

        document.getElementById("lyrics").innerHTML = text;
      }
      function startLetterHearts() {
        setInterval(() => {
          let heart = document.createElement("div");

          heart.className = "heart";

          heart.innerHTML = "❤️";

          heart.style.left = Math.random() * 100 + "%";

          heart.style.bottom = "0px";

          document.getElementById("letterArea").appendChild(heart);

          setTimeout(() => heart.remove(), 4000);
        }, 300);
      }
    </script>
  </body>
</html>
